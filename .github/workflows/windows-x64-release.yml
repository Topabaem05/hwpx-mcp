name: Windows x64 Release Build

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to upload asset (e.g. v4.0.0)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "electron-ui/package-lock.json"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve release and build versions
        shell: pwsh
        run: |
          $tag = ""
          $package = Get-Content (Join-Path $env:GITHUB_WORKSPACE "electron-ui/package.json") | ConvertFrom-Json
          $buildVersion = if ($package.buildVersionLabel) { "$($package.buildVersionLabel)" } else { "$($package.version)" }

          if ("${{ github.event_name }}" -eq "push" -and "${{ github.ref_type }}" -eq "tag") {
            $tag = "${{ github.ref_name }}"
          } elseif ("${{ github.event_name }}" -eq "workflow_dispatch" -and "${{ inputs.tag }}" -ne "") {
            $tag = "${{ inputs.tag }}"
          }

          "RELEASE_TAG=$tag" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "BUILD_VERSION=$buildVersion" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install backend build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[local_llm] pyinstaller

      - name: Install Electron dependencies
        working-directory: electron-ui
        shell: pwsh
        run: npm install

      - name: Build bundled Windows x64 installer
        working-directory: electron-ui
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
        run: npm run build:win:bundle -- --x64

      - name: Verify bundled backend executable exists
        shell: pwsh
        run: |
          $backendBuildDir = Join-Path $env:GITHUB_WORKSPACE "dist/hwpx-mcp-backend-win"
          $backendBuildLauncher = Join-Path $backendBuildDir "hwpx-mcp-backend.bat"
          if (-not (Test-Path $backendBuildLauncher)) {
            throw "Backend build launcher missing: $backendBuildLauncher"
          }

          $backendPython = Join-Path $backendBuildDir "python/python.exe"
          if (-not (Test-Path $backendPython)) {
            throw "Backend Python runtime missing: $backendPython"
          }

          $bundledBackendDir = Join-Path $env:GITHUB_WORKSPACE "dist/electron-installer/win-unpacked/resources/backend-win"
          if (-not (Test-Path $bundledBackendDir)) {
            throw "Bundled backend directory missing: $bundledBackendDir"
          }

          $bundledBackendLauncher = Join-Path $bundledBackendDir "hwpx-mcp-backend.bat"
          if (-not (Test-Path $bundledBackendLauncher)) {
            throw "Bundled backend launcher missing in resources/backend-win."
          }

          $bundledBackendPython = Join-Path $bundledBackendDir "python/python.exe"
          if (-not (Test-Path $bundledBackendPython)) {
            throw "Bundled backend Python runtime missing in resources/backend-win."
          }

          $proxyLauncher = Join-Path $env:GITHUB_WORKSPACE "dist/codex-proxy-win/codex-proxy.bat"
          if (-not (Test-Path $proxyLauncher)) {
            throw "Windows codex proxy launcher missing: $proxyLauncher"
          }

          $bundledProxyLauncher = Join-Path $env:GITHUB_WORKSPACE "dist/electron-installer/win-unpacked/resources/codex-proxy-win/codex-proxy.bat"
          if (-not (Test-Path $bundledProxyLauncher)) {
            throw "Bundled codex proxy launcher missing in resources/codex-proxy-win."
          }

          $bundledProxyPython = Join-Path $env:GITHUB_WORKSPACE "dist/electron-installer/win-unpacked/resources/codex-proxy-win/python/python.exe"
          if (-not (Test-Path $bundledProxyPython)) {
            throw "Bundled codex proxy Python runtime missing: $bundledProxyPython"
          }

      - name: Smoke test bundled backend executable
        shell: pwsh
        run: |
          $backendLauncher = Join-Path $env:GITHUB_WORKSPACE "dist/electron-installer/win-unpacked/resources/backend-win/hwpx-mcp-backend.bat"
          if (-not (Test-Path $backendLauncher)) {
            throw "Bundled backend launcher missing: $backendLauncher"
          }

          $backendLogPath = Join-Path $env:RUNNER_TEMP "backend-win.log"
          if (Test-Path $backendLogPath) {
            Remove-Item $backendLogPath -Force
          }

          $env:MCP_TRANSPORT = "streamable-http"
          $env:MCP_HOST = "127.0.0.1"
          $env:MCP_PORT = "18000"
          $env:MCP_PATH = "/mcp"
          $process = Start-Process -FilePath "cmd.exe" -ArgumentList "/c", "`"$backendLauncher`" > `"$backendLogPath`" 2>&1" -WindowStyle Hidden -PassThru
          try {
            $healthy = $false
            for ($i = 0; $i -lt 45; $i++) {
              try {
                $health = Invoke-RestMethod -Uri "http://127.0.0.1:18000/agent/health" -TimeoutSec 2
                if ($health.status -eq "ok") {
                  $healthy = $true
                  break
                }
              } catch {
                Start-Sleep -Seconds 1
              }
            }

             if (-not $healthy) {
               if (Test-Path $backendLogPath) {
                 Write-Host "Bundled backend log:"
                 Get-Content $backendLogPath -Tail 200 | ForEach-Object { Write-Host $_ }
               }
                throw "Bundled backend executable did not become healthy on http://127.0.0.1:18000/agent/health"
              }

             if ($health.local_model.dependency_installed -ne $true) {
               throw "Bundled backend is missing local Qwen dependencies."
             }
           }
           finally {
             Remove-Item Env:BACKEND_LOG_PATH -ErrorAction SilentlyContinue
             Remove-Item Env:MCP_TRANSPORT -ErrorAction SilentlyContinue
             Remove-Item Env:MCP_HOST -ErrorAction SilentlyContinue
             Remove-Item Env:MCP_PORT -ErrorAction SilentlyContinue
            Remove-Item Env:MCP_PATH -ErrorAction SilentlyContinue
            if ($process -and -not $process.HasExited) {
              taskkill /PID $process.Id /F /T | Out-Null
            }
          }

      - name: Smoke test bundled codex proxy launcher
        shell: pwsh
        run: |
          $proxyLauncher = Join-Path $env:GITHUB_WORKSPACE "dist/electron-installer/win-unpacked/resources/codex-proxy-win/codex-proxy.bat"
          if (-not (Test-Path $proxyLauncher)) {
            throw "Bundled codex proxy launcher missing: $proxyLauncher"
          }

          $proxyLogPath = Join-Path $env:RUNNER_TEMP "codex-proxy.log"
          if (Test-Path $proxyLogPath) {
            Remove-Item $proxyLogPath -Force
          }
          $env:CODEX_PROXY_LOG_PATH = $proxyLogPath

          $process = Start-Process -FilePath $proxyLauncher -WindowStyle Hidden -PassThru
          try {
            $healthy = $false
            for ($i = 0; $i -lt 45; $i++) {
              try {
                $health = Invoke-RestMethod -Uri "http://127.0.0.1:2455/health" -TimeoutSec 2
                $models = Invoke-RestMethod -Uri "http://127.0.0.1:2455/v1/models" -TimeoutSec 2
                $hasDataField = $null -ne $models -and $models.PSObject.Properties.Name -contains "data"
                if ($health.status -eq "ok" -and $hasDataField) {
                  $healthy = $true
                  break
                }
              } catch {
                Start-Sleep -Seconds 1
              }
            }

            if (-not $healthy) {
              if (Test-Path $proxyLogPath) {
                Write-Host "Bundled codex proxy log:"
                Get-Content $proxyLogPath -Tail 200 | ForEach-Object { Write-Host $_ }
              }
              throw "Bundled codex proxy did not become healthy on http://127.0.0.1:2455"
            }
          }
          finally {
            Remove-Item Env:CODEX_PROXY_LOG_PATH -ErrorAction SilentlyContinue
            if ($process -and -not $process.HasExited) {
              taskkill /PID $process.Id /F /T | Out-Null
            }
          }

      - name: Collect updater artifacts
        shell: pwsh
        run: |
          $outputDir = Join-Path $env:GITHUB_WORKSPACE "dist/electron-installer"
          $assetDir = Join-Path $outputDir "release-assets"
          New-Item -ItemType Directory -Path $assetDir -Force | Out-Null

          $installer = Get-ChildItem $outputDir -File -Filter "HWPX.MCP-*-win-x64.exe" | Sort-Object LastWriteTime -Descending | Select-Object -First 1

          if (-not $installer) {
            throw "Installer .exe not found in $outputDir"
          }

          $latestYml = Join-Path $outputDir "latest.yml"
          if (-not (Test-Path $latestYml)) {
            throw "Updater metadata missing: $latestYml"
          }

          $latestYmlContent = Get-Content $latestYml -Raw
          if ($latestYmlContent -notmatch [regex]::Escape($installer.Name)) {
            throw "Updater metadata does not reference installer: $($installer.Name)"
          }

          $blockmaps = Get-ChildItem $outputDir -File -Filter *.blockmap
          if (-not $blockmaps -or $blockmaps.Count -eq 0) {
            throw "Updater blockmap file missing in $outputDir"
          }

          Copy-Item -Path $installer.FullName -Destination (Join-Path $assetDir $installer.Name) -Force
          Copy-Item -Path $latestYml -Destination (Join-Path $assetDir "latest.yml") -Force

          foreach ($blockmap in $blockmaps) {
            Copy-Item -Path $blockmap.FullName -Destination (Join-Path $assetDir $blockmap.Name) -Force
          }

          "ASSET_DIR=$assetDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64-installer
          path: ${{ env.ASSET_DIR }}
          if-no-files-found: error

      - name: Ensure GitHub release exists
        if: env.RELEASE_TAG != ''
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$env:RELEASE_TAG" --repo "$env:GITHUB_REPOSITORY" *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create "$env:RELEASE_TAG" --title "$env:RELEASE_TAG" --notes "Automated Windows x64 release build." --repo "$env:GITHUB_REPOSITORY"
          }

      - name: Upload asset to GitHub release
        if: env.RELEASE_TAG != ''
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          Get-ChildItem $env:ASSET_DIR -File | ForEach-Object {
            gh release upload "$env:RELEASE_TAG" $_.FullName --clobber --repo "$env:GITHUB_REPOSITORY"
          }
